<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapi</title>
</head>
<body>
    <h1>hola mundo</h1>
    <pre id="logs">Cargando logs...</pre>
    <script>
        fetch('/logs')
            .then(res => res.text())
            .then(text => document.getElementById('logs').textContent = text)
            .catch(() => document.getElementById('logs').textContent = 'Error al cargar los logs.');
    </script>
</body>
</html>
